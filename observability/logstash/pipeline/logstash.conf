input {
  tcp {
    port => 5000
    codec => "json_lines"
  }
}

filter {
  # Schema Enforcement: Ensure logs conform to the expected format
  if [logger_name] and [thread_name] and [level] {
    mutate {
      add_tag => ["schema_valid"]
    }
  } else {
    mutate {
      add_tag => ["schema_invalid"]
    }
    # In a strict production environment, we might drop invalid logs entirely to protect dashboard integrity:
    # drop { }
  }
}

output {
  if "schema_invalid" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "qe-platform-deadletter-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "qe-platform-logs-%{+YYYY.MM.dd}"
    }
  }
  stdout { codec => "rubydebug" }
}
