name: QE Platform PR Validation

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Run Smoke Tests (TIA Subset)
      run: mvn clean test -pl qe-core,qe-api,qe-ui -DsuiteXmlFile=src/test/resources/suites/smoke.xml -Denv=qa -Dheadless=true
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Intelligence Dependencies
      run: pip install -r qe-intelligence/requirements.txt
      
    - name: Run Cost & TIA Analysis
      run: |
        python qe-intelligence/src/cost_calculator.py qe-intelligence/sample_results.json target/pr_comment.md
        python qe-intelligence/src/quarantine_manager.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        TEST_HISTORY_CSV: qe-intelligence/sample_history.csv
        
    - name: Post PR Comment
      uses: thollander/actions-comment-pull-request@v2
      if: github.event_name == 'pull_request'
      with:
        filePath: target/pr_comment.md
      
    - name: Generate Allure Report
      if: always()
      run: mvn allure:report
      
    - name: Upload Allure Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: allure-report
        path: target/site/allure-maven-plugin/
        retention-days: 7
